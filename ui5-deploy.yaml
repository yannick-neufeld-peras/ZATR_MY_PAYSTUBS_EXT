# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "3.1"
metadata:
  name: atr.paystubs.ext
type: application
resources:
  configuration:
    propertiesFileSourceEncoding: UTF-8
customConfiguration:
  adp:
    support:
      id: '@sap/generator-adaptation-project'
      version: NO_VERSION_FOUND
      toolsId: 1287a807-7bda-4674-891b-1f0823a8e581
builder:
  resources:
    excludes:
      - /test/**
      - /localService/**
  customTasks:
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        target:
          destination: FGS-100
          url: http://fidmgwfgs:443
          client: '100'
        app:
          package: ZFGI_HCMFAB
          transport: FGSK901519
        exclude:
          - /test/
          - /localService/
        lrep: apps/hcm.fab.mypaystubs/appVariants/customer.atr.paystubs.ext/
